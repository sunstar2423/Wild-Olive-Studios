<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Wild Olive Studios">
  <defs>
    <radialGradient id="bg" cx="0.7" cy="0.1" r="1">
      <stop offset="0" stop-color="#16301f"/>
      <stop offset="0.6" stop-color="#0c1610"/>
    </radialGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fcf6b"/>
      <stop offset="1" stop-color="#4f8f43"/>
    </linearGradient>
    <radialGradient id="og" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#e7b75f"/>
      <stop offset="1" stop-color="#5a6e2f"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative olive branch on the right -->
  <g transform="translate(820,120)">
    <path d="M120 400 C 120 280 110 200 150 60" fill="none" stroke="#6b4f3a" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="160" cy="70"  rx="40" ry="16" fill="url(#lg)" transform="rotate(-28 160 70)"/>
    <ellipse cx="92"  cy="150" rx="40" ry="16" fill="url(#lg)" transform="rotate(32 92 150)"/>
    <ellipse cx="165" cy="180" rx="34" ry="13" fill="url(#lg)" transform="rotate(-18 165 180)"/>
    <ellipse cx="95"  cy="250" rx="34" ry="13" fill="url(#lg)" transform="rotate(28 95 250)"/>
    <circle cx="180" cy="110" r="17" fill="url(#og)"/>
    <circle cx="78"  cy="195" r="17" fill="url(#og)"/>
    <circle cx="150" cy="230" r="15" fill="url(#og)"/>
  </g>

  <!-- text -->
  <text x="90" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#7fb069" font-weight="bold" letter-spacing="6">🌿 INDIE GAME STUDIO</text>
  <text x="86" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="110" fill="#eef3ea" font-weight="bold">Wild Olive</text>
  <text x="86" y="470" font-family="Georgia, 'Times New Roman', serif" font-size="110" fill="#9fcf6b" font-weight="bold" font-style="italic">Studios</text>
  <text x="90" y="545" font-family="Arial, sans-serif" font-size="34" fill="#aebaa6">We grow wild worlds from small, stubborn seeds.</text>
</svg>
