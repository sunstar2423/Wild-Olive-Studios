<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Tidy rows of green crops on a sustainable farm under a bright sky with a windmill and sun">
  <defs>
    <linearGradient id="gaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3f4"/>
      <stop offset="1" stop-color="#e8f5d8"/>
    </linearGradient>
    <linearGradient id="gaField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc24a"/>
      <stop offset="1" stop-color="#3f8b34"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#gaSky)"/>
  <!-- sun -->
  <circle cx="990" cy="160" r="74" fill="#ffe08a"/>
  <g stroke="#ffe08a" stroke-width="8" stroke-linecap="round" opacity="0.8">
    <line x1="990" y1="40" x2="990" y2="64"/><line x1="990" y1="256" x2="990" y2="280"/>
    <line x1="870" y1="160" x2="894" y2="160"/><line x1="1086" y1="160" x2="1110" y2="160"/>
    <line x1="905" y1="75" x2="922" y2="92"/><line x1="1058" y1="228" x2="1075" y2="245"/>
    <line x1="1075" y1="75" x2="1058" y2="92"/><line x1="922" y1="228" x2="905" y2="245"/>
  </g>
  <!-- clouds -->
  <g fill="#ffffff" opacity="0.92">
    <ellipse cx="250" cy="150" rx="70" ry="30"/><ellipse cx="310" cy="160" rx="55" ry="26"/><ellipse cx="200" cy="165" rx="46" ry="22"/>
  </g>
  <!-- rolling hills -->
  <path d="M0 360 Q300 300 620 350 T1200 350 V470 H0 Z" fill="#9fd36a"/>
  <!-- field -->
  <path d="M0 430 H1200 V750 H0 Z" fill="url(#gaField)"/>
  <!-- furrow rows in perspective -->
  <g stroke="#2f6f2a" stroke-width="5" opacity="0.55">
    <path d="M120 750 L470 440"/><path d="M340 750 L545 440"/><path d="M560 750 L620 440"/>
    <path d="M780 750 L695 440"/><path d="M1000 750 L770 440"/><path d="M1180 750 L845 440"/>
  </g>
  <!-- crop emoji-style sprouts -->
  <g>
    <g transform="translate(300 600)"><path d="M0 0 q-20 -34 -2 -60 q18 26 2 60" fill="#4caf50"/><path d="M0 -6 q22 -28 44 -22 q-18 28 -44 22" fill="#66bb6a"/></g>
    <g transform="translate(640 660)"><path d="M0 0 q-22 -38 -2 -68 q20 30 2 68" fill="#43a047"/><path d="M0 -8 q24 -32 50 -24 q-20 32 -50 24" fill="#66bb6a"/></g>
    <g transform="translate(940 600)"><path d="M0 0 q-20 -34 -2 -60 q18 26 2 60" fill="#4caf50"/><path d="M0 -6 q-22 -28 -44 -22 q18 28 44 22" fill="#5cb85c"/></g>
  </g>
  <!-- wind turbine (clean energy) -->
  <g transform="translate(180 360)">
    <rect x="-6" y="0" width="12" height="120" fill="#f4f4f0"/>
    <g fill="#f4f4f0" stroke="#cfd6c8" stroke-width="2">
      <path d="M0 0 L8 -86 L-8 -78 Z"/><path d="M0 0 L78 30 L72 12 Z"/><path d="M0 0 L-74 36 L-66 18 Z"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#dfe6d6"/>
  </g>
</svg>
