<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="A winding trail rolling through pine forest under a warm sky, a cyclist riding the path">
  <defs>
    <linearGradient id="ptSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe9c8"/>
      <stop offset="0.55" stop-color="#f4cf8f"/>
      <stop offset="1" stop-color="#e7b75f"/>
    </linearGradient>
    <linearGradient id="ptGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fbf6f"/>
      <stop offset="1" stop-color="#3f7a40"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#ptSky)"/>
  <circle cx="940" cy="180" r="90" fill="#fff3da" opacity="0.85"/>
  <!-- distant hills -->
  <path d="M0 360 Q200 300 420 350 T840 340 T1200 360 V470 H0 Z" fill="#cbe0a0" opacity="0.7"/>
  <!-- ground -->
  <path d="M0 400 Q300 360 600 400 T1200 400 V750 H0 Z" fill="url(#ptGround)"/>
  <!-- winding trail -->
  <path d="M540 750 Q470 560 600 470 Q720 390 640 320" fill="none" stroke="#e9dcc0" stroke-width="120" stroke-linecap="round" opacity="0.95"/>
  <path d="M540 750 Q470 560 600 470 Q720 390 640 320" fill="none" stroke="#fff7e6" stroke-width="6" stroke-dasharray="22 26" stroke-linecap="round" opacity="0.8"/>
  <!-- pines -->
  <g fill="#2f6b39">
    <path d="M210 470 l46 0 -23 -120 z"/><path d="M196 420 l74 0 -37 -110 z"/><path d="M186 365 l94 0 -47 -120 z"/>
    <rect x="227" y="465" width="12" height="34" fill="#5a4126"/>
  </g>
  <g fill="#356f3e">
    <path d="M330 500 l40 0 -20 -104 z"/><path d="M318 456 l64 0 -32 -96 z"/><path d="M310 408 l80 0 -40 -104 z"/>
    <rect x="344" y="496" width="11" height="30" fill="#5a4126"/>
  </g>
  <g fill="#2a6235">
    <path d="M905 520 l54 0 -27 -140 z"/><path d="M888 462 l88 0 -44 -128 z"/><path d="M876 398 l112 0 -56 -140 z"/>
    <rect x="924" y="514" width="14" height="40" fill="#5a4126"/>
  </g>
  <!-- cyclist -->
  <g transform="translate(560 560)">
    <circle cx="-34" cy="36" r="30" fill="none" stroke="#1c2b1c" stroke-width="7"/>
    <circle cx="40" cy="36" r="30" fill="none" stroke="#1c2b1c" stroke-width="7"/>
    <path d="M-34 36 L0 6 L40 36 M0 6 L-6 -2" fill="none" stroke="#c0392b" stroke-width="7" stroke-linecap="round"/>
    <path d="M3 -34 q8 16 -3 40" fill="none" stroke="#27408b" stroke-width="9" stroke-linecap="round"/>
    <circle cx="6" cy="-44" r="13" fill="#f0c27b"/>
    <path d="M-6 -2 q12 -10 22 -8" fill="none" stroke="#1c2b1c" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- drifting paper -->
  <g fill="#fffdf5" opacity="0.9">
    <rect x="740" y="250" width="26" height="34" rx="3" transform="rotate(18 753 267)"/>
    <rect x="800" y="320" width="22" height="28" rx="3" transform="rotate(-12 811 334)"/>
    <rect x="690" y="200" width="18" height="24" rx="3" transform="rotate(28 699 212)"/>
  </g>
</svg>
