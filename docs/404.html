<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost in the grove — Wild Olive Studios</title>
  <link rel="icon" type="image/svg+xml" href="/wild-olive-studios/assets/favicon.svg" />
  <link rel="stylesheet" href="/wild-olive-studios/css/style.css" />
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 2rem; }
    .nf__code { font-family: var(--font-display); font-weight: 900; font-size: clamp(5rem, 18vw, 12rem); line-height: 1; color: var(--olive-br); }
    .nf__msg { font-family: var(--font-display); font-size: clamp(1.6rem, 4vw, 2.4rem); margin: .4rem 0 1rem; }
    .nf p { color: var(--ink-soft); max-width: 44ch; margin: 0 auto 2rem; }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <main class="nf">
    <div>
      <div class="nf__code">404</div>
      <h1 class="nf__msg">This branch didn't bear fruit 🌿</h1>
      <p>The page you're looking for has wandered off into the wild. Let's get you back to the grove.</p>
      <a class="btn btn--primary" href="/wild-olive-studios/">Back to home</a>
    </div>
  </main>
  <script src="/wild-olive-studios/js/main.js" defer></script>
</body>
</html>
